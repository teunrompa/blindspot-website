services:
  db:
    image: postgres:16
    container_name: blindspot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: teun
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: blindspot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
